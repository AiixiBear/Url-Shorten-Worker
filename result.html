<!DOCTYPE html>
<html lang="zh-TW">

<head>
	<meta charset="utf-8" />
	<title>正在跳轉…</title>
	<meta http-equiv="Refresh" content="1; url={__FINAL_LINK__}" />
	<meta name="referrer" content="no-referrer" />
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
			background-color: #eef0f3;
			color: #1b1f24;
		}

		@media (prefers-color-scheme: dark) {
			body {
				background-color: #14171c;
				color: #e6e9ed;
			}

			a {
				color: #6f8fff;
			}
		}

		.box {
			text-align: center;
			padding: 32px;
		}

		.spinner {
			width: 28px;
			height: 28px;
			margin: 0 auto 16px;
			border: 3px solid rgba(53, 86, 216, 0.2);
			border-top-color: #3556d8;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}

		p {
			font-size: 0.9rem;
			color: #5b6470;
			margin-bottom: 6px;
		}

		a {
			color: #3556d8;
			font-family: "JetBrains Mono", Menlo, Consolas, monospace;
			font-size: 0.85rem;
			word-break: break-all;
			text-decoration: none;
		}

		a:hover {
			text-decoration: underline;
		}
	</style>
</head>

<body>
	<div class="box">
		<div class="spinner" aria-hidden="true"></div>
		<p>正在為您跳轉至目的網址…</p>
		<a href="{__FINAL_LINK__}">{__FINAL_LINK__}</a>
	</div>
	<script type="text/javascript">
		/* <![CDATA[ */
		setTimeout('window.location.replace( "{__FINAL_LINK__}" + window.location.hash );', 1000 )

/* ]]> */
	</script>
</body>

</html>
